<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 18px;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Welcome to My Website</h1>
    <p>Hello! My name is Lee Chi Yat.</p>
    <p>This is my first website made with HTML.</p>

    <button onclick="sayHello()">Click Me!</button>
</div>

<script>
function sayHello() {
    alert("Hello! Thanks for visiting my website!");
}
</script>

</body>
</html>
